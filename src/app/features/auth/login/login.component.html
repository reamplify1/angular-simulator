<div class="login-page">

  <section class="hero">

    <div class="hero-content">

      <i class="pi pi-compass hero-icon"></i>

      <h1>Explore the Mountains</h1>

      <p class="hero-text">
        Там, где заканчиваются дороги, начинаются настоящие приключения.
      </p>

      <div class="features">

        <div class="feature">
          <i class="pi pi-check-circle"></i>
          <span>Более 500 проверенных маршрутов</span>
        </div>

        <div class="feature">
          <i class="pi pi-check-circle"></i>
          <span>Профессиональные гиды</span>
        </div>

        <div class="feature">
          <i class="pi pi-check-circle"></i>
          <span>Незабываемые путешествия</span>
        </div>

      </div>

    </div>

  </section>

  <section class="login-side">

    <p-card class="login-card">

      <ng-template pTemplate="header">

        <div class="header">

          <h2>Добро пожаловать</h2>

          <p>Войдите в свой аккаунт</p>

        </div>

      </ng-template>

      <form
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()">

        <div class="field">

          <label for="username">
            Имя пользователя
          </label>

          <span class="p-input-icon-left w-full">
            <i class="pi pi-user"></i>

            <input
              pInputText
              id="username"
              class="w-full"
              formControlName="username"
              placeholder="Введите имя пользователя">
          </span>

        </div>

        <div class="field">

          <label for="password">
            Пароль
          </label>

          <span class="p-input-icon-left w-full">
            <i class="pi pi-lock"></i>

            <input
              pInputText
              id="password"
              type="password"
              class="w-full"
              formControlName="password"
              placeholder="Введите пароль">
          </span>

        </div>

        <p-button
          type="submit"
          label="Войти"
          icon="pi pi-sign-in"
          styleClass="w-full"
          [disabled]="loginForm.invalid">
        </p-button>

      </form>

    </p-card>

  </section>

</div>
