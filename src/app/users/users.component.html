<button
  (click)="refresh()"
  id="refresh-users-button"
  class="refresh-button"
  [class.loading]="loading"
>
  <img src="images/icons/refresh-icon.svg" class="refresh-icon" alt="refresh-button">
</button>

<app-create-user (addUser)="addUser($event)" />

<div class="search-container">
  <img src="images/icons/search-icon.svg" class="search-icon" alt="search">
  <input
    id="search-input"
    class="search-input"
    type="text"
    [(ngModel)]="searchValue"
    placeholder="Поиск пользователей..."
  >
</div>
<div class="user-card-list__wrapper">
  @for (user of filteredUsers; track user.id) {
    <app-user-card [user]="user" (delete)="deleteUser($event)"/>
  } @empty {
    <div class="user-card-empty">
      Нет пользователей для отображения
    </div>
  }
</div>
